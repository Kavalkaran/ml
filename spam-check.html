  <div id="loader" hidden>⏳ പരിശോധിക്കുന്നു...</div>

  <section id="notice"></section>

  <div id="report"></div>

<script>

document.getElementById('checkBtn').addEventListener('click', checkURL);

async function checkURL() {
  const urlField = document.getElementById('urlInput');
  const report = document.getElementById('report');
  const loader = document.getElementById('loader');
  const url = urlField.value.trim();

  report.innerHTML = '';
  loader.hidden = false;


  // 👇 SHOW NOTICE ONLY WHEN USER CLICKS SCAN
  showPremiumNotice();


  if (!isValidURL(url)) {
    showError("⚠️ ദയവായി സാധുവായ https:// ലിങ്ക് നൽകൂ.", "warn", report, loader);
    return;
  }

  const domain = new URL(url).hostname;
  appendLine(report, `<p>🌐 URL: <code>${url}</code></p>`);

  try {
    await Promise.allSettled([
      checkSSL(domain, report),
      checkWHOIS(domain, report),
      checkHeaders(url, report),
      checkPhishTank(url, report),
      checkSpamhaus(domain, report),
      unshorten(url, report),
      aiHeuristic(url, report),
      showScreenshot(url, report)  // Added thum.io screenshot preview
    ]);
  } catch (e) {
    appendLine(report, `<p class="warn">⚠️ ചില പരിശോധനകൾ പരാജയപ്പെട്ടു: ${e.message}</p>`);
  }

  finalVerdict(url, report);
  loader.hidden = true;
}

// -------------------- Helper Functions -------------------- //

function isValidURL(u) {
  try {
    const parsed = new URL(u);
    return parsed.protocol === "https:" || parsed.protocol === "http:";
  } catch {
    return false;
  }
}

async function checkSSL(domain, report) {
  appendLine(report, `<p>🔒 SSL പരിശോധന...</p>`);
  try {
    await fetch(`https://${domain}`, { method: "HEAD", mode: "no-cors" });
    appendLine(report, `<p>SSL: <span class="safe">ഉണ്ട്</span></p>`);
  } catch {
    appendLine(report, `<p>SSL: <span class="danger">ഇല്ല അല്ലെങ്കിൽ പ്രതികരിക്കുന്നില്ല</span></p>`);
  }
}

async function checkWHOIS(domain, report) {
  appendLine(report, `<p>🌍 WHOIS പരിശോധിക്കുന്നു...</p>`);
  try {
    const res = await fetch(`https://api.whois.vu/?q=${domain}`);
    const text = await res.text();
    const found = text.includes("Domain Name");
    appendLine(report, `<p>WHOIS: ${found ? '<span class="safe">കണ്ടെത്തി</span>' : '<span class="warn">കണ്ടെത്തിയില്ല</span>'}</p>`);
  } catch {
    appendLine(report, `<p class="warn">⚠️ WHOIS API ലഭിച്ചില്ല.</p>`);
  }
}

async function checkHeaders(url, report) {
  appendLine(report, `<p>🔌 Header പരിശോധിക്കുന്നു...</p>`);
  try {
    const res = await fetch(url, { method: "HEAD" });
    appendLine(report, `<p>Header: <span class="safe">${res.status} ${res.statusText}</span></p>`);
  } catch (e) {
    appendLine(report, `<p class="warn">⚠️ Header ലഭിച്ചില്ല: ${e.message}</p>`);
  }
}

async function checkPhishTank(url, report) {
  appendLine(report, `<p>🎣 ഫിഷിംഗ് പരിശോധിക്കുന്നു...</p>`);
  try {
    const res = await fetch(`https://checkurl.phishtank.com/checkurl/?url=${encodeURIComponent(url)}&format=json`);
    const data = await res.json();
    const phish = data.results?.in_database && data.results?.valid;
    appendLine(report, `PhishTank: ${phish ? '<span class="danger">⚠️ ഫിഷിംഗ് സാധ്യത</span>' : '<span class="safe">സുരക്ഷിതം</span>'}`);
  } catch {
    appendLine(report, `<p class="warn">⚠️ ഫിഷിംഗ് ഡാറ്റ ലഭിച്ചില്ല.</p>`);
  }
}

async function checkSpamhaus(domain, report) {
  appendLine(report, `<p>🚫 Spamhaus DBL പരിശോധിക്കുന്നു...</p>`);
  try {
    const res = await fetch(`https://dns.google/resolve?name=${domain}.dbl.spamhaus.org&type=A`);
    const data = await res.json();
    appendLine(report, `Spamhaus: ${data.Answer ? '<span class="danger">ബ്ലാക്ക്‌ലിസ്റ്റിൽ ഉണ്ട്</span>' : '<span class="safe">ബ്ലാക്ക്‌ലിസ്റ്റിൽ ഇല്ല</span>'}`);
  } catch {
    appendLine(report, `<p class="warn">⚠️ Spamhaus കണക്ഷൻ പരാജയം.</p>`);
  }
}

async function unshorten(url, report) {
  appendLine(report, `<p>🔗 ലിങ്ക് Unshort ചെയ്യുന്നു...</p>`);
  try {
    const res = await fetch(url, { redirect: "follow" });
    appendLine(report, `<p>അവസാന URL: <code>${res.url}</code></p>`);
  } catch {
    appendLine(report, `<p class="warn">⚠️ Unshort ചെയ്യാനായില്ല.</p>`);
  }
}

function aiHeuristic(url, report) {
  appendLine(report, `<p>🧠 AI heuristic പരിശോധിക്കുന്നു...</p>`);
  return new Promise(resolve => {
    setTimeout(() => {
      const hints = [];
      if (/bit\.ly|tinyurl/.test(url)) hints.push("⚠️ ചുരുക്കിയ ലിങ്ക്");
      if (/login|signin/.test(url)) hints.push("⚠️ 'Login' പദം – ഫിഷിംഗ് സാധ്യത");
      if (/\.(exe|apk)$/.test(url)) hints.push("🚫 അപകടകരമായ ഫയൽ ഫോർമാറ്റ്");
      if (!hints.length) hints.push("✅ നിയന്ത്രിതമായ അടയാളങ്ങൾ ഇല്ല.");
      appendLine(report, `<pre>${hints.join("\n")}</pre>`);
      resolve();
    }, 400);
  });
}

function finalVerdict(url, report) {
  const score = [
    !url.startsWith("https"),
    /bit\.ly/.test(url),
    /login/.test(url),
    /\.(exe|apk)$/.test(url)
  ].filter(Boolean).length;

  if (score >= 2)
    appendLine(report, `<p class="danger">🔴 അപകടകരം – ഈ ലിങ്ക് തുറക്കരുത്!</p>`);
  else if (score === 1)
    appendLine(report, `<p class="warn">🟡 സംശയകരം – ജാഗ്രത ആവശ്യമാണ്.</p>`);
  else
    appendLine(report, `<p class="safe">🟢 സുരക്ഷിതമായി തോന്നുന്നു.</p>`);
}

function appendLine(el, html) {
  el.innerHTML += html;
}

function showError(msg, cls, report, loader) {
  report.innerHTML = `<p class="${cls}">${msg}</p>`;
  loader.hidden = true;
}

// New function to add thum.io screenshot preview
async function showScreenshot(url, report) {
  appendLine(report, `<p>🖼️ സൈറ്റിന്റെ സ്ക്രീൻഷോട്ട് കാണിക്കുന്നു...</p>`);
  const encodedUrl = encodeURIComponent(url);
  const imgSrc = `https://image.thum.io/get/width/600/crop/600/${url}`;
  appendLine(report, `<a href="${imgSrc}"> <button> view websites sample look </button></a>`);
}

  <script>
  // Prefill URL input if query parameter exists
function getQueryParam(name) {
  const params = new URLSearchParams(window.location.search);
  return params.get(name);
}

const prefillUrl = getQueryParam('url');
if (prefillUrl) {
  const urlInput = document.getElementById('urlInput');
  urlInput.value = decodeURIComponent(prefillUrl);
  // Optionally auto-run the check
  document.getElementById('checkBtn').click();
}
